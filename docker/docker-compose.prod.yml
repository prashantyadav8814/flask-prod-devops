version: '3.9'
services:
  flask-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: flask-app
    ports:
      - "5000:5000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask-app
